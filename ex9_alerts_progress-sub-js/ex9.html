<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts e Progress Bar Bootstrap Interativos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <section class="container mt-3">
        <div class="mb-3">
            <button class="btn btn-success me-2" id="showSuccessBtn">
                Mostrar Sucesso
            </button>
            <button class="btn btn-danger me-2" id="showErrorBtn">
                Mostrar Erro
            </button>
            <button class="btn btn-warning" id="showToastBtn">
                Mostrar Toast
            </button>
        </div>

        <div class="alert alert-success alert-dismissible fade" id="successAlert" role="alert">
            <strong>Sucesso!</strong> Operação Realizada com Sucesso!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="alert alert-danger alert-dismissible fade" id="errorAlert" role="alert">
            <strong>Erro!</strong> Erro ao processar a operação!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080;">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <strong class="me-auto">Notificação</strong>
                    <small>Agora</small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Esta é uma mensagem de toast
                </div>
            </div>
        </div>

        <h5 class="mt-4">Progresso:</h5>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar progress-bar-striped" id="dynamicProgress" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                0%
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" id="decreaseBtn">-10%</button>
            <button class="btn btn-primary" id="increaseBtn">+10%</button>
        </div>
        <button class="btn btn-success ms-2" id="toggleAnimationBtn">
            Toggle Animação 
        </button>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="teste.js"></script>
</body>
</html>
