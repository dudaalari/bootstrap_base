 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <!-- 1ª Digitação (Aqui) -->
     <div class="container mt-3 d-flex justify-content-center ">
        <form class="custom-form card shadow p-4 border-0" style="max-width: 420px; width:100%;">
            
            <div class="col-sm-12 mb-3">
                <div class="input-group"></div>
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <i class="bi bi-envelope"></i>
                <input type="email" class="form-control custom-input" id="email" placeholder="Digite seu email">
            </div>

            <div class="col-sm-12 mb-3">
                <div class="input-group">
                    <span class="input-group-text custom-icon bg-white">
                        <i class="bi bi-person"></i>
                    </span>
                     <input type="text" class="form-control custom-input" placeholder="UserName">
                </div>
            </div>

            <div class="col-sm-12 mb-3">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <i class="bi-lock"></i>

                <input type="password" class="form-control custom-input mb-3" id="senha" placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="btn btn-primary custom-button mb-3 bi-arrow-right">
                Enviar
            </button>

        </form>
     </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
